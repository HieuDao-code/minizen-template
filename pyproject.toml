[project]
name = "minizen"
version = "0.0.0"
description = "A quieter way to stay informed"
readme = "README.md"
requires-python = ">=3.14"
dependencies = ["anthropic>=0.94.1,<1.0.0", "miniflux>=1.1.6,<2.0.0"]

[dependency-groups]
dev = [
  { include-group = "docs" },
  { include-group = "lint" },
  { include-group = "test" },
]
docs = ["zensical>=0.0.32,<1.0.0"]
lint = [
  "commitizen>=4.13.10,<5.0.0",
  "ruff>=0.15.10,<1.0.0",
  "ty>=0.0.29,<1.0.0",
  "zizmor>=1.24.1,<2.0.0",
]
test = [
  "pytest>=9.0.3,<10.0.0",
  "pytest-cov>=7.1.0,<8.0.0",
  "pytest-mock>=3.15.1,<4.0.0",
]

[tool.uv]
exclude-newer = "1 week"

[tool.commitizen]
name = "cz_conventional_commits"
tag_format = "$version"
version_scheme = "pep440"
version_provider = "uv"
update_changelog_on_bump = true
version_files = ["src/minizen/core/__init__.py"]
major_version_zero = true

[tool.ruff]
target-version = "py314"

[tool.ruff.lint]
select = [
  "A",     # flake8-builtins
  "ASYNC", # flake8-async
  "B",     # flake8-bugbear
  "C4",    # flake8-comprehensions
  "C90",   # mccabe complexity
  "E",     # pycodestyle error
  "F",     # pyflakes
  "FAST",  # fastapi
  "I",     # isort
  "N",     # pep8-naming
  "PERF",  # Perflint
  "PIE",   # flake8-pie
  "PLR",   # pylint refactor
  "PT",    # flake8-pytest-style
  "PYI",   # flake8-pyi
  "RUF",   # ruff
  "S",     # flake8-bandit
  "SIM",   # flake8-simplify
  "UP",    # pyupgrade
  "W",     # pycodestyle warnings
]
ignore = [
  "B904", # raise-without-from-inside-except
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = [
  "S101", # assert
]

[tool.ruff.lint.isort]
known-first-party = ["minizen"]
force-wrap-aliases = true
combine-as-imports = true

[tool.ruff.format]
docstring-code-format = true

[tool.tox]
env_list = ["py314", "lint"]

[tool.tox.env_run_base]
description = "Run tests"
dependency_groups = ["dev"]
commands = [
  [
    "pytest",
    "--cov=minizen",
    "--cov-report=term-missing",
    "--cov-fail-under=100",
  ],
]

[tool.tox.env.lint]
description = "Run linters"
skip_install = true
dependency_groups = ["lint"]
commands = [
  [
    "ruff",
    "check",
  ],
  [
    "ruff",
    "format",
    "--check",
  ],
  [
    "ty",
    "check",
  ],
  [
    "zizmor",
    '.',
    "--persona",
    "auditor",
  ],
  [
    "cz",
    "check",
    "--rev-range",
    "origin/main..HEAD",
  ],
]
