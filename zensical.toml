[project]
site_name = "minizen-template"
site_url = "https://hieudao-code.github.io/minizen-template"
site_description = "A quieter way to stay informed"
site_author = "Hieu Dao"
repo_url = "https://github.com/HieuDao-Code/minizen-template"

[project.theme]
features = ["content.code.copy", "content.tooltips"]

[project.theme.icon]
repo = "fontawesome/brands/github"

# Palette: automatic mode (system preference)
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "material/brightness-auto"
toggle.name = "Switch to light mode"

# Palette: light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

# Palette: dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to system preference"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/HieuDao-Code/minizen-template"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/minizen-template"

# ---------------------------------------------------------------------------
# Extensions
# ---------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.attr_list]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
