repos:
  # ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: d1b833175a5d08a925900115526febd8fe71c98e # frozen: v0.15.11
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]

  # uv audit
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 6a280ba12b7901e47757c868c8c13c6a624c9ecb # frozen: 0.11.7
    hooks:
      - id: uv-audit

  # zizmor
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: a4727cbbcd26d7098e96b9cb738169b59711ae51 # frozen: v1.24.1
    hooks:
      - id: zizmor
        args: ["--persona", "auditor"]

  # commitizen
  - repo: https://github.com/commitizen-tools/commitizen
    rev: b5d5040f7980a5d2bce320d2a1ea1e04ac54b00c # frozen: v4.13.10
    hooks:
      - id: commitizen
        stages: [pre-push]
