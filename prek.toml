minimum_prek_version = "0.3.12"

[auto_update]
cooldown_days = 7

# ruff
[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "0671d8ab202c4ac093b78433ae5baf74f3fc7246"                          # frozen: v0.15.15
hooks = [{ id = "ruff-check", args = ["--fix"] }, { id = "ruff-format" }]

# uv
[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "3e7518446022606defbcdadcf8170a40cc680a8c"    # frozen: 0.11.18
hooks = [{ id = "uv-audit" }, { id = "uv-lock" }]

# zizmor
[[repos]]
repo = "https://github.com/zizmorcore/zizmor-pre-commit"
rev = "9257c6050c0261b8c57e712f632dc4a8010109a9"             # frozen: v1.25.2
hooks = [{ id = "zizmor", args = ["--persona", "auditor"] }]

# commitizen
[[repos]]
repo = "https://github.com/commitizen-tools/commitizen"
rev = "286da5488db79f4cf5261e14a3c8976d89b5aa70"        # frozen: v4.16.3
hooks = [{ id = "commitizen", stages = ["pre-push"] }]

# ty
[[repos]]
repo = "https://github.com/astral-sh/ty-pre-commit"
rev = "918cf00966c1e291e829f7819b7b7c2a0b0ff31f"    # frozen: v0.0.47
hooks = [{ id = "ty" }]
