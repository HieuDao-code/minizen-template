[auto_update]
cooldown_days = 7

# ruff
[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "6fec9b7edb08fd9989088709d864a7826dc74e80"  # frozen: v0.15.12
hooks = [{ id = "ruff-check", args = ["--fix"] }, { id = "ruff-format" }]

# uv
[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "659a7789596d520c849e9c96525119e9fbaa731f"  # frozen: 0.11.8
hooks = [{ id = "uv-audit" }, { id = "uv-lock" }]

# zizmor
[[repos]]
repo = "https://github.com/zizmorcore/zizmor-pre-commit"
rev = "a4727cbbcd26d7098e96b9cb738169b59711ae51"  # frozen: v1.24.1
hooks = [{ id = "zizmor", args = ["--persona", "auditor"] }]

# commitizen
[[repos]]
repo = "https://github.com/commitizen-tools/commitizen"
rev = "b4f42099479e89287849346bfa9021e1c2d99e04"  # frozen: v4.15.0
hooks = [{ id = "commitizen", stages = ["pre-push"] }]

# ty TODO: https://github.com/astral-sh/ty/issues/269
[[repos]]
repo = "local"
hooks = [
  { id = "local-ty", name = "ty check", entry = "uv run ty check", language = "python", pass_filenames = false },
]
